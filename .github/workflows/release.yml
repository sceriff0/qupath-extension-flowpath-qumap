name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*-all.jar
          generate_release_notes: true

      - name: Update catalog
        env:
          CATALOG_PAT: ${{ secrets.CATALOG_PAT }}
          TAG: ${{ github.ref_name }}
        if: env.CATALOG_PAT != ''
        run: |
          JAR_NAME=$(basename "$(ls build/libs/*-all.jar | head -1)")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${JAR_NAME}"

          git clone https://x-access-token:${CATALOG_PAT}@github.com/sceriff0/flowpath-catalog.git /tmp/catalog
          cd /tmp/catalog

          EXTENSION_NAME="FlowPath - qUMAP"

          NEW_RELEASE=$(jq -n --arg name "$TAG" --arg url "$DOWNLOAD_URL" \
            '{name: $name, main_url: $url, version_range: {min: "v0.7.0"}}')

          jq --arg ext "$EXTENSION_NAME" --argjson release "$NEW_RELEASE" \
            '(.extensions[] | select(.name == $ext) | .releases) |= [$release] + .' \
            catalog.json > catalog.tmp && mv catalog.tmp catalog.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git commit -m "Add ${EXTENSION_NAME} ${TAG} to catalog"
          git push
